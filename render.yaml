# Render 部署設定
# 把這個 repo 連到 Render 後，會自動讀取此檔案

services:
  - type: web
    name: line-stock-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false          # 在 Render Dashboard 手動填入
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
